<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Herambha Blogs</title>
    <link rel="stylesheet" href="../static/register.css">
</head>
<body>

<div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Join Herambha Blogs today</p>

    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Your name">

    <label for="email">Email</label>
    <div class="otp-row">
        <input type="email" id="email" placeholder="you@example.com">
        <button class="otp-btn" id="otp-btn" onclick="sendOtp()">Send OTP</button>
    </div>

    <label for="otp">OTP</label>
    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
    <div class="timer" id="timer">OTP expires in <span id="countdown">10:00</span></div>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min 6 characters">

    <label for="confirm">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password">

    <button class="btn" onclick="register()">Create Account</button>

    <p class="msg">Already have an account? <a href="/login">Login here</a></p>
</div>

<script>
    window.onload = function () {
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const username = localStorage.getItem("username");

    const loginBtn = document.getElementById("login-btn");
    const registerBtn = document.getElementById("register-btn");
    const postBtn = document.getElementById("post-btn");
    const userCircle = document.getElementById("user-circle");

    if (isLoggedIn === "true") {
        // hide login/register
        if (loginBtn) loginBtn.style.display = "none";
        if (registerBtn) registerBtn.style.display = "none";

        // show user first letter
        if (userCircle && username) {
            userCircle.style.display = "inline-flex";
            userCircle.innerText = username.charAt(0).toUpperCase();
        }

        // change post → publish
        if (postBtn) {
            postBtn.innerText = "Publish";
            postBtn.href = "/publish";
        }
    }
};
    let timerInterval;

    async function sendOtp() {
        const email = document.getElementById('email').value.trim();
        const errorBox = document.getElementById('error-msg');
        const successBox = document.getElementById('success-msg');

        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        if (!email) {
            errorBox.textContent = 'Please enter your email first.';
            errorBox.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/otp_sending', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_email: email })
            });

            const data = await res.json();

            if (res.ok) {
                successBox.textContent = data.message;
                successBox.style.display = 'block';
                startTimer(10 * 60);

                // disable button for 60 seconds
                const btn = document.getElementById('otp-btn');
                btn.disabled = true;
                let sec = 60;
                const interval = setInterval(() => {
                    btn.textContent = `Resend (${sec}s)`;
                    sec--;
                    if (sec < 0) {
                        clearInterval(interval);
                        btn.disabled = false;
                        btn.textContent = 'Resend OTP';
                    }
                }, 1000);
            } else {
                errorBox.textContent = data.message || 'Failed to send OTP.';
                errorBox.style.display = 'block';
            }
        } catch (e) {
            errorBox.textContent = 'Server error. Please try again.';
            errorBox.style.display = 'block';
        }
    }

    function startTimer(seconds) {
        clearInterval(timerInterval);
        const timerEl = document.getElementById('timer');
        const countdown = document.getElementById('countdown');
        timerEl.style.display = 'block';

        timerInterval = setInterval(() => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            countdown.textContent = m + ':' + String(s).padStart(2, '0');
            seconds--;
            if (seconds < 0) {
                clearInterval(timerInterval);
                countdown.textContent = 'Expired';
            }
        }, 1000);
    }

    async function register() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const otp_ = document.getElementById('otp').value.trim();
        const password = document.getElementById('password').value.trim();
        const conform_pass = document.getElementById('confirm').value.trim();
        const errorBox = document.getElementById('error-msg');
        const successBox = document.getElementById('success-msg');

        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        if (!username || !email || !otp_ || !password || !conform_pass) {
            errorBox.textContent = 'Please fill all fields.';
            errorBox.style.display = 'block';
            return;
        }

        if (password !== conform_pass) {
            errorBox.textContent = 'Passwords do not match.';
            errorBox.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/registration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, otp_, password, conform_pass })
            });

            const data = await res.json();

            if (res.ok) {
                successBox.textContent = data.message + ' Redirecting to login...';
                successBox.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                errorBox.textContent = data.message || 'Registration failed.';
                errorBox.style.display = 'block';
            }
        } catch (e) {
            errorBox.textContent = 'Server error. Please try again.';
            errorBox.style.display = 'block';
        }
    }
</script>

</body>
</html>
