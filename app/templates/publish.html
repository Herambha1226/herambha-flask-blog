<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Post - Herambha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        nav {
            background: white;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .nav-logo { font-size: 20px; font-weight: bold; color: #4f8ef7; text-decoration: none; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: #555; font-size: 14px; }
        .nav-links a:hover { color: #4f8ef7; }

        .page-wrap {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 26px;
            font-weight: bold;
            color: #222;
            margin-bottom: 24px;
        }

        .form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            padding: 32px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            font-family: Arial, sans-serif;
        }

        input:focus, textarea:focus { border-color: #4f8ef7; }

        textarea { height: 200px; resize: vertical; }

        .tags-hint {
            font-size: 12px;
            color: #aaa;
            margin-top: -16px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 32px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { background: #3a7ae0; }

        .error { background: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
        .success { background: #f0fff4; color: #2e7d32; border: 1px solid #c8e6c9; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Herambha</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/blogs">All Posts</a>
        <a href="/login">Login</a>
        <a id="user-circle" href="/dashboard" style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #4f8ef7;
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 15px;
            margin-left: 10px;
        "></a>
    </div>
</nav>

<div class="page-wrap">
    <div class="page-title">Write a New Post</div>

    <div class="form-card">
        <div class="error" id="error-msg"></div>
        <div class="success" id="success-msg"></div>

        <label for="title">Post Title</label>
        <input type="text" id="title" placeholder="Enter your post title">

        <label for="author">Your Name</label>
        <input type="text" id="author" placeholder="Your name">

        <label for="tags">Tags</label>
        <input type="text" id="tags" placeholder="flask, python, backend">
        <p class="tags-hint">Separate tags with commas</p>

        <label for="content">Content</label>
        <textarea id="content" placeholder="Write your blog post here..."></textarea>

        <button class="btn" onclick="publishPost()">Publish Post</button>
    </div>
</div>

<script>
    window.onload = function () {
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const username = localStorage.getItem("username");

    const loginBtn = document.getElementById("login-btn");
    const registerBtn = document.getElementById("register-btn");
    const postBtn = document.getElementById("post-btn");
    const userCircle = document.getElementById("user-circle");

    if (isLoggedIn === "true") {
        // hide login/register
        if (loginBtn) loginBtn.style.display = "none";
        if (registerBtn) registerBtn.style.display = "none";

        // show user first letter
        if (userCircle && username) {
            userCircle.style.display = "inline-flex";
            userCircle.innerText = username.charAt(0).toUpperCase();
        }

        // change post → publish
        if (postBtn) {
            postBtn.innerText = "Publish";
            postBtn.href = "/publish";
        }
    }
};
    async function publishPost() {
        const title = document.getElementById('title').value.trim();
        const author = document.getElementById('author').value.trim();
        const content = document.getElementById('content').value.trim();
        const tagsRaw = document.getElementById('tags').value.trim();
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

        const errorBox = document.getElementById('error-msg');
        const successBox = document.getElementById('success-msg');

        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        if (!title || !author || !content) {
            errorBox.textContent = 'Please fill title, author and content.';
            errorBox.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/publish_post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, author, content, tags })
            });

            const data = await res.json();

            if (res.ok) {
                successBox.textContent = data.message + ' Redirecting...';
                successBox.style.display = 'block';
                localStorage.setItem('author', author);
                setTimeout(() => window.location.href = '/blogs', 1500);
            } else {
                errorBox.textContent = data.message || 'Failed to publish.';
                errorBox.style.display = 'block';
            }
        } catch {
            errorBox.textContent = 'Server error. Make sure you are logged in.';
            errorBox.style.display = 'block';
        }
    }
</script>

</body>
</html>
